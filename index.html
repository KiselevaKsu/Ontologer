<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Дискретная Математика</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background-color: #0f3460;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(90deg, #e94560 0%, #533483 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 { font-size: 20px; }
        .mode-switch {
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 30px;
        }
        .mode-btn {
            padding: 8px 15px;
            border-radius: 25px;
            border: none;
            background: transparent;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
            white-space: nowrap;
        }
        .mode-btn.active {
            background: white;
            color: #533483;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #1a1a2e;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        .message-user { align-items: flex-end; }
        .message-bot { align-items: flex-start; }
        .message-bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
        }
        .user-bubble {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .bot-bubble {
            background-color: #2d2d44;
            color: #f0f0f0;
            border-bottom-left-radius: 5px;
            border: 1px solid #3a3a5c;
        }
        .message-time {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
        .input-area {
            padding: 20px;
            background-color: #16213e;
            display: flex;
            gap: 10px;
            border-top: 1px solid #2d2d44;
            flex-wrap: wrap;
        }
        .input-area input {
            flex: 1;
            min-width: 200px;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background-color: #1a1a2e;
            color: white;
            font-size: 16px;
            outline: none;
            border: 1px solid #3a3a5c;
        }
        .input-area input:focus { border-color: #e94560; }
        .input-area input::placeholder { color: #888; }
        .input-area button {
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #e94560 0%, #533483 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #3a3a5c;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-bar {
            background: #2d2d44;
            padding: 10px 20px;
            color: white;
            text-align: center;
            font-size: 14px;
            border-bottom: 1px solid #3a3a5c;
        }
        .test-controls {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            background: #16213e;
            justify-content: center;
            border-top: 1px solid #2d2d44;
        }
        .test-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            background: #533483;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }
        .copy-btn {
            background: #2d6a4f;
            margin-left: 5px;
            padding: 2px 8px;
            border-radius: 10px;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 11px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>Дискретная Математика</h1>
        <div class="mode-switch">
            <button class="mode-btn active" data-mode="consult">Консультация</button>
            <button class="mode-btn" data-mode="test">Тестирование</button>
        </div>
    </div>
    
    <div class="progress-bar" id="progressBar" style="display: none;"></div>
    
    <!-- Два независимых чата -->
    <div class="chat-messages" id="consultChat">
        <div class="message message-bot">
            <div class="message-bubble bot-bubble">Режим консультации. Задайте вопрос по учебнику.</div>
        </div>
    </div>
    <div class="chat-messages" id="testChat" style="display: none;">
        <div class="message message-bot">
            <div class="message-bubble bot-bubble">Режим тестирования. Нажмите "Начать тест".</div>
        </div>
    </div>
    
    <div class="input-area" id="inputArea">
        <input type="text" id="mainInput" placeholder="Задайте вопрос..." />
        <button id="sendButton">Отправить</button>
    </div>
    
    <div class="test-controls" id="testControls" style="display: none;">
        <button class="test-btn" id="startTestBtn">Начать тест</button>
    </div>
</div>

<script>
    let currentMode = 'consult';
    let testSessionId = null;
    let isWaiting = false;
    
    const consultChat = document.getElementById('consultChat');
    const testChat = document.getElementById('testChat');
    const mainInput = document.getElementById('mainInput');
    const sendButton = document.getElementById('sendButton');
    const progressBar = document.getElementById('progressBar');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const inputArea = document.getElementById('inputArea');
    const testControls = document.getElementById('testControls');
    const startTestBtn = document.getElementById('startTestBtn');
    
    // Переключение режимов
    modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            modeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
            
            if (currentMode === 'consult') {
                consultChat.style.display = 'block';
                testChat.style.display = 'none';
                inputArea.style.display = 'flex';
                testControls.style.display = 'none';
                progressBar.style.display = 'none';
                mainInput.placeholder = 'Задайте вопрос...';
            } else {
                consultChat.style.display = 'none';
                testChat.style.display = 'block';
                inputArea.style.display = 'flex';
                testControls.style.display = 'flex';
                if (testSessionId) {
                    mainInput.placeholder = 'Введите ответ...';
                } else {
                    mainInput.placeholder = 'Нажмите "Начать тест"';
                }
            }
        });
    });
    
    function getCurrentChat() {
        return currentMode === 'consult' ? consultChat : testChat;
    }
    
    function addMessage(text, sender, isLoading = false) {
        const chat = getCurrentChat();
        const msgDiv = document.createElement('div');
        msgDiv.className = `message message-${sender}`;
        const bubble = document.createElement('div');
        bubble.className = `message-bubble ${sender}-bubble`;
        if (isLoading) {
            bubble.innerHTML = '<div class="loading"></div>';
        } else {
            bubble.textContent = text;
        }
        const timeDiv = document.createElement('div');
        timeDiv.className = 'message-time';
        timeDiv.textContent = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        msgDiv.appendChild(bubble);
        msgDiv.appendChild(timeDiv);
        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;
        return msgDiv;
    }
    
    function addBotMessageWithCopy(text, copyText) {
        const chat = getCurrentChat();
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message message-bot';
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble bot-bubble';
        bubble.textContent = text;
        
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = 'Скопировать';
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(copyText);
            copyBtn.textContent = 'Скопировано!';
            setTimeout(() => { copyBtn.textContent = 'Скопировать'; }, 2000);
        };
        bubble.appendChild(document.createElement('br'));
        bubble.appendChild(copyBtn);
        
        const timeDiv = document.createElement('div');
        timeDiv.className = 'message-time';
        timeDiv.textContent = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        msgDiv.appendChild(bubble);
        msgDiv.appendChild(timeDiv);
        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;
        return msgDiv;
    }
    
    function setWaiting(waiting) {
        isWaiting = waiting;
        mainInput.disabled = waiting;
        sendButton.disabled = waiting;
    }
    
    // Консультация
    async function askQuestion(question) {
        if (!question) return;
        addMessage(question, 'user');
        setWaiting(true);
        const loadingMsg = addMessage('', 'bot', true);
        try {
            const response = await fetch('http://127.0.0.1:5000/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question})
            });
            const data = await response.json();
            loadingMsg.querySelector('.message-bubble').textContent = data.answer;
            loadingMsg.querySelector('.message-bubble').className = 'message-bubble bot-bubble';
        } catch (e) {
            loadingMsg.querySelector('.message-bubble').textContent = 'Ошибка соединения';
        }
        setWaiting(false);
    }
    
    // Тестирование
    async function startTest() {
        setWaiting(true);
        addMessage('Генерация вопросов...', 'bot');
        try {
            const response = await fetch('http://127.0.0.1:5000/test/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            });
            const data = await response.json();
            if (data.error) {
                addMessage(`Ошибка: ${data.error}`, 'bot');
                setWaiting(false);
                return;
            }
            testSessionId = data.session_id;
            progressBar.style.display = 'block';
            progressBar.textContent = `Вопрос ${data.question_number}/${data.total_questions}`;
            
            addMessage(`Вопрос ${data.question_number}/${data.total_questions}:`, 'bot');
            addBotMessageWithCopy(data.question, data.question);
            
            mainInput.placeholder = 'Введите ответ...';
            mainInput.value = '';
            mainInput.focus();
        } catch (e) {
            addMessage('Ошибка соединения', 'bot');
        }
        setWaiting(false);
    }
    
    async function submitAnswer(answer) {
        if (!answer && answer !== '') return;
        addMessage(answer, 'user');
        setWaiting(true);
        try {
            const response = await fetch('http://127.0.0.1:5000/test/answer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({session_id: testSessionId, answer})
            });
            const data = await response.json();
            
            if (data.completed) {
                progressBar.style.display = 'none';
                testSessionId = null;
                addMessage(`Тест завершён! Результат: ${data.total_score.toFixed(2)}/${data.max_score} (${data.percentage}%)`, 'bot');
                addMessage(`Последний ответ: ${data.feedback}\nЭталон: ${data.expected}`, 'bot');
                mainInput.placeholder = 'Нажмите "Начать тест"';
                mainInput.value = '';
            } else {
                progressBar.textContent = `Вопрос ${data.question_number}/${data.total_questions}`;
                addMessage(`Оценка: ${data.score.toFixed(2)}/1.00 — ${data.feedback}`, 'bot');
                addMessage(`Эталон: ${data.expected}`, 'bot');
                
                addMessage(`Вопрос ${data.question_number}/${data.total_questions}:`, 'bot');
                addBotMessageWithCopy(data.question, data.question);
                
                mainInput.value = '';
                mainInput.focus();
            }
        } catch (e) {
            addMessage('Ошибка соединения', 'bot');
        }
        setWaiting(false);
    }
    
    // Отправка
    sendButton.addEventListener('click', () => {
        const value = mainInput.value.trim();
        if (!value || isWaiting) return;
        mainInput.value = '';
        
        if (currentMode === 'consult') {
            askQuestion(value);
        } else {
            if (!testSessionId) {
                addMessage('Нажмите "Начать тест" сначала', 'bot');
                return;
            }
            submitAnswer(value);
        }
    });
    
    mainInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendButton.click();
    });
    
    startTestBtn.addEventListener('click', startTest);
</script>
</body>
</html>
