<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Дискретная Математика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background-color: #0f3460;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(90deg, #e94560 0%, #533483 100%);
            padding: 20px;
            text-align: center;
            color: white;
        }
        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #1a1a2e;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        .message-user {
            align-items: flex-end;
        }
        .message-bot {
            align-items: flex-start;
        }
        .message-bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
        }
        .user-bubble {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .bot-bubble {
            background-color: #2d2d44;
            color: #f0f0f0;
            border-bottom-left-radius: 5px;
            border: 1px solid #3a3a5c;
        }
        .message-time {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
        .chat-input {
            padding: 20px;
            background-color: #16213e;
            display: flex;
            gap: 10px;
            border-top: 1px solid #2d2d44;
        }
        .chat-input input {
            flex: 1;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background-color: #1a1a2e;
            color: white;
            font-size: 16px;
            outline: none;
            border: 1px solid #3a3a5c;
            transition: 0.3s;
        }
        .chat-input input:focus {
            border-color: #e94560;
        }
        .chat-input input::placeholder {
            color: #888;
        }
        .chat-input button {
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #e94560 0%, #533483 100%);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .chat-input button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }
        .chat-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #3a3a5c;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .source-info {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            padding-left: 5px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>Дискретная Математика</h1>
            <p>RAG система • Локальная LLM • Без интернета</p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message message-bot">
                <div class="message-bubble bot-bubble">
                    Привет! Я — ассистент по дискретной математике.<br>
                    Задайте вопрос по учебнику, и я найду ответ.
                </div>
                <div class="message-time">Только что</div>
            </div>
        </div>
        
        <div class="chat-input">
            <input 
                type="text" 
                id="questionInput" 
                placeholder="Например: Что такое граф?"
                onkeypress="handleKeyPress(event)"
            >
            <button id="sendButton" onclick="sendQuestion()">➤</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const questionInput = document.getElementById('questionInput');
        const sendButton = document.getElementById('sendButton');

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendQuestion();
            }
        }

        function addMessage(text, sender, isLoading = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${sender}`;
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = `message-bubble ${sender}-bubble`;
            
            if (isLoading) {
                bubbleDiv.innerHTML = '<div class="loading"></div>';
            } else {
                bubbleDiv.textContent = text;
            }
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = new Date().toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            messageDiv.appendChild(bubbleDiv);
            messageDiv.appendChild(timeDiv);
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return messageDiv;
        }

        function updateMessage(messageDiv, text, sender) {
            const bubble = messageDiv.querySelector('.message-bubble');
            bubble.textContent = text;
            bubble.className = `message-bubble ${sender}-bubble`;
        }

        async function sendQuestion() {
            const question = questionInput.value.trim();
            
            if (!question) return;
            
            addMessage(question, 'user');
            
            questionInput.value = '';
            
            sendButton.disabled = true;
            questionInput.disabled = true;
            
            const loadingMessage = addMessage('', 'bot', true);
            
            try {
                const response = await fetch('http://127.0.0.1:5000/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question: question })
                });
                
                const data = await response.json();
                
                updateMessage(loadingMessage, data.answer, 'bot');
                
            } catch (error) {
                console.error('Ошибка:', error);
                updateMessage(loadingMessage, 'Ошибка соединения с сервером. Убедитесь, что сервер запущен.', 'bot');
            } finally {
                sendButton.disabled = false;
                questionInput.disabled = false;
                questionInput.focus();
            }
        }
    </script>
</body>
</html>
