<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Дискретная Математика</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background-color: #0f3460;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(90deg, #e94560 0%, #533483 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .header h1 { font-size: 22px; }
        .mode-switch {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 30px;
        }
        .mode-btn {
            padding: 8px 20px;
            border-radius: 25px;
            border: none;
            background: transparent;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }
        .mode-btn.active {
            background: white;
            color: #533483;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #1a1a2e;
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        .message-user { align-items: flex-end; }
        .message-bot { align-items: flex-start; }
        .message-bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
        }
        .user-bubble {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .bot-bubble {
            background-color: #2d2d44;
            color: #f0f0f0;
            border-bottom-left-radius: 5px;
            border: 1px solid #3a3a5c;
        }
        .message-time {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
        .input-area {
            padding: 20px;
            background-color: #16213e;
            display: flex;
            gap: 10px;
            border-top: 1px solid #2d2d44;
        }
        .input-area input {
            flex: 1;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background-color: #1a1a2e;
            color: white;
            font-size: 16px;
            outline: none;
            border: 1px solid #3a3a5c;
        }
        .input-area input:focus { border-color: #e94560; }
        .input-area input::placeholder { color: #888; }
        .input-area button {
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #e94560 0%, #533483 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #3a3a5c;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-bar {
            background: #2d2d44;
            padding: 10px 20px;
            color: white;
            text-align: center;
            font-size: 14px;
            border-bottom: 1px solid #3a3a5c;
        }
        .score-badge {
            background: #e94560;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        .feedback-block {
            background: #2d2d44;
            padding: 10px 15px;
            border-radius: 10px;
            margin: 10px 0;
            color: #ccc;
            font-size: 14px;
        }
        .restart-btn {
            background: #533483;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px auto;
            display: block;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>Дискретная Математика</h1>
        <div class="mode-switch">
            <button class="mode-btn active" data-mode="consult">Консультация</button>
            <button class="mode-btn" data-mode="test">Тестирование</button>
        </div>
    </div>
    
    <div class="progress-bar" id="progressBar" style="display: none;"></div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message message-bot">
            <div class="message-bubble bot-bubble">
                Привет! Выберите режим.<br>
                • Консультация — задайте вопрос по учебнику<br>
                • Тестирование — проверьте свои знания
            </div>
        </div>
    </div>
    
    <div class="input-area">
        <input type="text" id="mainInput" placeholder="Задайте вопрос..." />
        <button id="sendButton">➤</button>
    </div>
</div>

<script>
    // Состояние приложения
    let currentMode = 'consult';
    let testSessionId = null;
    let isWaiting = false;
    
    const chatMessages = document.getElementById('chatMessages');
    const mainInput = document.getElementById('mainInput');
    const sendButton = document.getElementById('sendButton');
    const progressBar = document.getElementById('progressBar');
    const modeBtns = document.querySelectorAll('.mode-btn');
    
    // Переключение режимов
    modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            modeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
            
            // Сброс интерфейса
            testSessionId = null;
            progressBar.style.display = 'none';
            mainInput.placeholder = currentMode === 'consult' 
                ? 'Задайте вопрос...' 
                : 'Нажмите "Начать тест"';
            
            if (currentMode === 'consult') {
                clearChat();
                addBotMessage('Режим консультации. Задайте вопрос по учебнику.');
            } else {
                clearChat();
                showStartTestButton();
            }
        });
    });
    
    function clearChat() {
        chatMessages.innerHTML = '';
    }
    
    function addMessage(text, sender, isLoading = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message message-${sender}`;
        const bubble = document.createElement('div');
        bubble.className = `message-bubble ${sender}-bubble`;
        if (isLoading) {
            bubble.innerHTML = '<div class="loading"></div>';
        } else {
            bubble.textContent = text;
        }
        const timeDiv = document.createElement('div');
        timeDiv.className = 'message-time';
        timeDiv.textContent = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        msgDiv.appendChild(bubble);
        msgDiv.appendChild(timeDiv);
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return msgDiv;
    }
    
    function addBotMessage(text) {
        addMessage(text, 'bot');
    }
    
    function addUserMessage(text) {
        addMessage(text, 'user');
    }
    
    function showStartTestButton() {
        const container = document.createElement('div');
        container.className = 'message message-bot';
        container.innerHTML = `
            <div class="message-bubble bot-bubble">
                <p>Тестирование состоит из 5 вопросов по учебнику.</p>
                <button class="restart-btn" onclick="startTest()">Начать тест</button>
            </div>
        `;
        chatMessages.appendChild(container);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        mainInput.disabled = true;
        sendButton.disabled = true;
    }
    
    async function startTest() {
        setWaiting(true);
        addBotMessage('Генерация вопросов...');
        
        try {
            const response = await fetch('http://127.0.0.1:5000/test/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            });
            const data = await response.json();
            
            if (data.error) {
                addBotMessage(`Ошибка: ${data.error}`);
                setWaiting(false);
                return;
            }
            
            testSessionId = data.session_id;
            progressBar.style.display = 'block';
            updateProgress(data.question_number, data.total_questions);
            
            clearChat();
            addBotMessage(`Вопрос 1/${data.total_questions}:\n\n${data.question}`);
            
            mainInput.disabled = false;
            sendButton.disabled = false;
            mainInput.placeholder = 'Введите ответ...';
            mainInput.value = '';
            mainInput.focus();
            
        } catch (e) {
            addBotMessage('Ошибка соединения с сервером');
        }
        setWaiting(false);
    }
    
    async function submitAnswer(answer) {
        if (!answer && answer !== '') return;
        
        setWaiting(true);
        
        try {
            const response = await fetch('http://127.0.0.1:5000/test/answer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    session_id: testSessionId,
                    answer: answer
                })
            });
            const data = await response.json();
            
            if (data.completed) {
                // Тест завершён
                progressBar.style.display = 'none';
                clearChat();
                addBotMessage(
                    `Тест завершён!\n\n` +
                    `Ваш результат: ${data.total_score.toFixed(2)} / ${data.max_score}\n` +
                    `Процент: ${data.percentage}%\n\n` +
                    `Последний ответ: ${data.feedback}\n` +
                    `Эталон: ${data.expected}`
                );
                showRestartButton();
                mainInput.disabled = true;
                sendButton.disabled = true;
            } else {
                // Следующий вопрос
                updateProgress(data.question_number, data.total_questions);
                
                // Показываем фидбек
                const feedbackMsg = `Оценка: ${data.score.toFixed(2)} / 1.00\n${data.feedback}\n\nЭталон: ${data.expected}`;
                addBotMessage(feedbackMsg);
                
                // Показываем следующий вопрос
                addBotMessage(`Вопрос ${data.question_number}/${data.total_questions}:\n\n${data.question}`);
                
                mainInput.value = '';
                mainInput.focus();
            }
        } catch (e) {
            addBotMessage('Ошибка соединения');
        }
        setWaiting(false);
    }
    
    function updateProgress(current, total) {
        progressBar.textContent = `Вопрос ${current} из ${total}`;
    }
    
    function showRestartButton() {
        const container = document.createElement('div');
        container.className = 'message message-bot';
        container.innerHTML = `
            <div class="message-bubble bot-bubble">
                <button class="restart-btn" onclick="startTest()">Пройти тест заново</button>
            </div>
        `;
        chatMessages.appendChild(container);
    }
    
    async function askQuestion(question) {
        if (!question) return;
        
        addUserMessage(question);
        setWaiting(true);
        
        const loadingMsg = addMessage('', 'bot', true);
        
        try {
            const response = await fetch('http://127.0.0.1:5000/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question})
            });
            const data = await response.json();
            updateMessage(loadingMsg, data.answer, 'bot');
        } catch (e) {
            updateMessage(loadingMsg, 'Ошибка соединения', 'bot');
        }
        setWaiting(false);
    }
    
    function updateMessage(el, text, sender) {
        const bubble = el.querySelector('.message-bubble');
        bubble.textContent = text;
        bubble.className = `message-bubble ${sender}-bubble`;
    }
    
    function setWaiting(waiting) {
        isWaiting = waiting;
        mainInput.disabled = waiting;
        sendButton.disabled = waiting;
    }
    
    // Обработчики отправки
    sendButton.addEventListener('click', () => {
        const value = mainInput.value.trim();
        if (!value || isWaiting) return;
        
        if (currentMode === 'consult') {
            mainInput.value = '';
            askQuestion(value);
        } else {
            mainInput.value = '';
            addUserMessage(value);
            submitAnswer(value);
        }
    });
    
    mainInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendButton.click();
        }
    });
    
    // Глобальные функции для кнопок
    window.startTest = startTest;
</script>
</body>
</html>
